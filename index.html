<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#07101d" />
  <title>스대게 미네랄 기부 랭킹 TOP 100</title>
  <meta name="description" content="와이고수 스대게 미네랄 창고 기부 내역을 회원번호 기준으로 누적한 TOP 100 랭킹입니다." />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <style>
    :root {
      --bg: #07101d;
      --bg-2: #0d1c2e;
      --panel: rgba(13, 28, 46, .86);
      --panel-2: rgba(7, 16, 29, .94);
      --line: rgba(173, 190, 210, .18);
      --line-strong: rgba(245, 185, 78, .38);
      --text: #f6f9fd;
      --muted: #9fb0c5;
      --gold: #f5b94e;
      --green: #58d68d;
      --blue: #67b7ff;
      --red: #ff6f61;
      --shadow: 0 20px 48px rgba(0, 0, 0, .34);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        linear-gradient(135deg, rgba(245, 185, 78, .08) 0 18%, transparent 18% 100%),
        linear-gradient(180deg, #07101d 0%, #0b1727 44%, #050911 100%);
      color: var(--text);
      font-family: Pretendard, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      word-break: keep-all;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .026) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, .8), transparent 76%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .page {
      position: relative;
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 38px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 58px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(245, 185, 78, .18), rgba(103, 183, 255, .09));
      color: #fff7df;
      font-size: 15px;
      font-weight: 950;
      letter-spacing: 0;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .05);
    }

    .brand strong {
      display: block;
      font-size: 19px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .brand span,
    .source-link {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .source-link {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .04);
    }

    .summary-panel,
    .rank-column {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .summary-panel {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 18px;
      padding: 10px;
      background: linear-gradient(180deg, rgba(18, 39, 63, .72), rgba(7, 16, 29, .88));
    }

    .summary-item {
      min-height: 70px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 8px;
      background: rgba(255, 255, 255, .045);
    }

    .summary-item span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
    }

    .summary-item b {
      display: block;
      margin-top: 7px;
      color: #fff;
      font-size: 22px;
      line-height: 1;
    }

    .summary-item.gold b {
      color: var(--gold);
    }

    .summary-item.small b {
      font-size: 13px;
      line-height: 1.35;
    }

    .rank-board {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 16px;
      align-items: start;
    }

    .rank-column {
      overflow: hidden;
      background: var(--panel-2);
    }

    .column-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 46px;
      padding: 0 15px;
      border-bottom: 1px solid var(--line);
      color: #fff;
      font-size: 15px;
      font-weight: 950;
    }

    .column-title span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
    }

    .rank-head,
    .rank-row {
      display: grid;
      grid-template-columns: 52px minmax(120px, 1fr) 124px 64px;
      gap: 10px;
      align-items: center;
    }

    .rank-head {
      padding: 11px 14px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 11px;
      font-weight: 950;
      text-transform: uppercase;
    }

    .rank-row {
      min-height: 68px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, .07);
      transition: background .18s ease, transform .18s ease;
    }

    .rank-row:hover {
      background: rgba(255, 255, 255, .045);
    }

    .rank-row:last-child {
      border-bottom: 0;
    }

    .rank-number {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 8px;
      color: #dfe9f7;
      background: rgba(255, 255, 255, .05);
      font-weight: 950;
    }

    .rank-row.top .rank-number {
      color: #18110a;
      border-color: rgba(245, 185, 78, .82);
      background: linear-gradient(180deg, #ffe3a3, #f5b94e);
    }

    .donor {
      min-width: 0;
    }

    .donor strong {
      display: block;
      overflow: hidden;
      color: #fff;
      font-size: 15px;
      font-weight: 950;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .donor span,
    .reason {
      display: block;
      overflow: hidden;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .amount {
      color: var(--gold);
      font-size: 15px;
      font-weight: 950;
      text-align: right;
    }

    .count,
    .date {
      display: none;
      color: #d6e4f6;
      font-size: 13px;
      font-weight: 850;
      text-align: right;
    }

    .loading,
    .error {
      padding: 28px;
      color: var(--muted);
      font-weight: 850;
      text-align: center;
    }

    .error {
      color: #ffd2cc;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 16px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
    }

    @media (max-width: 1040px) {
      .summary-panel {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .rank-board {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 680px) {
      .page {
        width: min(100% - 18px, 1180px);
        padding-top: 12px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding-bottom: 12px;
      }

      .source-link {
        width: 100%;
        justify-content: center;
      }

      .summary-panel {
        grid-template-columns: 1fr;
        gap: 7px;
      }

      .rank-head {
        display: none;
      }

      .rank-row {
        grid-template-columns: 44px minmax(0, 1fr);
        gap: 10px;
        min-height: 0;
      }

      .amount,
      .count {
        grid-column: 2;
        text-align: left;
      }

      .amount {
        margin-top: -2px;
      }

      .count {
        color: var(--muted);
      }

      .rank-number {
        width: 38px;
        height: 38px;
      }

      .footer {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="brand" href="./">
        <span class="brand-mark" aria-hidden="true">MZ</span>
        <span>
          <strong>스대게 미네랄 기부 랭킹</strong>
          <span>회원번호 기준 누적 TOP 100</span>
        </span>
      </a>
      <a class="source-link" href="https://ygosu.com/board/pan_monstarz/?mode=mineral_storage" target="_blank" rel="noopener">원본 창고 보기</a>
    </header>

    <section class="summary-panel" aria-label="미네랄 기부 요약">
      <div class="summary-item gold">
        <span>누적 기부 미네랄</span>
        <b id="totalDonated">-</b>
      </div>
      <div class="summary-item">
        <span>기부 회원</span>
        <b id="donorCount">-</b>
      </div>
      <div class="summary-item">
        <span>현재 창고</span>
        <b id="storageAmount">-</b>
      </div>
      <div class="summary-item small">
        <span>마지막 갱신</span>
        <b id="updatedAt">불러오는 중</b>
      </div>
    </section>

    <section class="rank-board" aria-label="기부 랭킹 100위">
      <section class="rank-column" aria-label="기부 랭킹 1위부터 50위">
        <div class="column-title">1위-50위 <span>상위권</span></div>
        <div class="rank-head">
          <span>순위</span>
          <span>회원</span>
          <span>누적 기부</span>
          <span>횟수</span>
        </div>
        <div id="rankListLeft" class="loading">랭킹 데이터를 불러오는 중입니다.</div>
      </section>

      <section class="rank-column" aria-label="기부 랭킹 51위부터 100위">
        <div class="column-title">51위-100위 <span>추격권</span></div>
        <div class="rank-head">
          <span>순위</span>
          <span>회원</span>
          <span>누적 기부</span>
          <span>횟수</span>
        </div>
        <div id="rankListRight" class="loading">랭킹 데이터를 불러오는 중입니다.</div>
      </section>
    </section>

    <footer class="footer">
      <span id="scanInfo">수집 상태 확인 중</span>
      <span>자동 수집은 GitHub Actions에서 하루 한 번 실행됩니다.</span>
    </footer>
  </div>

  <script>
    const DATA_URL = "./data/mineral-donations.json";
    const $ = (id) => document.getElementById(id);
    const formatMineral = (value) => Number(value || 0).toLocaleString("ko-KR");
    const formatDate = (iso) => {
      if (!iso) return "-";
      const date = new Date(iso);
      if (Number.isNaN(date.getTime())) return "-";
      return date.toLocaleString("ko-KR", {
        timeZone: "Asia/Seoul",
        year: "2-digit",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      });
    };
    const escapeHtml = (value) =>
      String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");

    function renderColumn(targetId, rows) {
      const target = $(targetId);
      if (!target) return;

      if (!rows.length) {
        target.className = "loading";
        target.textContent = "아직 표시할 기부 내역이 없습니다.";
        return;
      }

      target.className = "";
      target.innerHTML = rows
        .map((row) => `
          <article class="rank-row ${row.rank <= 3 ? "top" : ""}">
            <div class="rank-number">${row.rank}</div>
            <div class="donor">
              <strong>${escapeHtml(row.nickname)}</strong>
              <span>회원번호 ${escapeHtml(row.memberId)}</span>
              <span class="reason">${escapeHtml(row.latestReason || "최근 사유 없음")}</span>
            </div>
            <div class="amount">${formatMineral(row.totalMineral)}</div>
            <div class="count">${formatMineral(row.donationCount)}회</div>
            <div class="date">${escapeHtml(row.latestDateText || "-")}</div>
          </article>
        `)
        .join("");
    }

    function renderRows(rows) {
      renderColumn("rankListLeft", rows.slice(0, 50));
      renderColumn("rankListRight", rows.slice(50, 100));
    }

    async function loadRanking() {
      try {
        const response = await fetch(`${DATA_URL}?v=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        $("updatedAt").textContent = formatDate(data.collectedAt);
        $("totalDonated").textContent = formatMineral(data.summary?.totalDonatedMineral);
        $("donorCount").textContent = formatMineral(data.summary?.donorCount);
        $("storageAmount").textContent = data.currentStorage?.text || "-";
        $("scanInfo").textContent = `${formatMineral(data.scan?.pagesScanned)}페이지 · ${formatMineral(data.scan?.donationRows)}건 기부 내역`;
        renderRows(Array.isArray(data.ranking) ? data.ranking : []);
      } catch (error) {
        console.error(error);
        $("updatedAt").textContent = "-";
        ["rankListLeft", "rankListRight"].forEach((targetId) => {
          $(targetId).className = "error";
          $(targetId).textContent = "랭킹 데이터를 불러오지 못했습니다.";
        });
        $("scanInfo").textContent = "data/mineral-donations.json 확인 필요";
      }
    }

    loadRanking();
  </script>
</body>
</html>
